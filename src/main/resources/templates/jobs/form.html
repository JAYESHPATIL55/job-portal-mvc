<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Job Form — Job Portal</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <div class="nav-brand">⚡ Job<span>Portal</span></div>
  <ul class="nav-links">
    <li><a th:href="@{/}">🏠 Home</a></li>
    <li><a th:href="@{/jobs}" class="active">💼 Jobs</a></li>
    <li><a th:href="@{/companies}">🏢 Companies</a></li>
    <li><a th:href="@{/candidates}">👤 Candidates</a></li>
    <li><a th:href="@{/applications}">📋 Applications</a></li>
  </ul>
</nav>
<main class="container">
  <div class="page-header">
    <div>
      <h1 th:text="${job.id != null ? '✏️ Edit Job' : '➕ Post New Job'}"></h1>
      <div class="page-title-sub" th:text="${job.id != null ? 'Update the job details below' : 'Fill in the details to post a new job'}"></div>
    </div>
    <a th:href="@{/jobs}" class="btn btn-secondary">← Back</a>
  </div>

  <div th:if="${#lists.isEmpty(companies)}" class="alert alert-danger">
    ⚠️ No companies exist yet. <a th:href="@{/companies/new}">Add a company first →</a>
  </div>

  <div class="form-card">
    <div class="form-card-header">
      <h2 th:text="${job.id != null ? 'Update Job Details' : 'New Job Posting'}"></h2>
      <p>All fields marked * are required</p>
    </div>
    <form th:action="${job.id != null ? '/jobs/' + job.id + '/edit' : '/jobs/new'}"
          th:object="${job}" method="post">
      <input type="hidden" th:if="${job.id != null}" th:field="*{id}"/>
      <div class="form-body">
        <div class="form-group">
          <label>Job Title *</label>
          <input type="text" name="title" th:value="${job.title}" class="form-control" placeholder="e.g. Senior Java Developer" required/>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" class="form-control" rows="4" placeholder="Key responsibilities, requirements, benefits…" th:text="${job.description}"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Location *</label>
            <input type="text" name="location" th:value="${job.location}" class="form-control" placeholder="e.g. Hyderabad" required/>
          </div>
          <div class="form-group">
            <label>Annual Salary (₹)</label>
            <input type="number" name="salary" th:value="${job.salary}" class="form-control" placeholder="e.g. 1200000" step="10000"/>
          </div>
        </div>
        <div class="form-group">
          <label>Company *</label>
          <select name="companyId" class="form-control" required>
            <option value="">— Select a company —</option>
            <option th:each="c : ${companies}" th:value="${c.id}"
                    th:text="${c.name} + ' · ' + ${c.location}"
                    th:selected="${job.companyId != null and job.companyId == c.id}"></option>
          </select>
        </div>
      </div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary" th:text="${job.id != null ? 'Update Job' : '🚀 Post Job'}"></button>
        <a th:href="@{/jobs}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</main>
</body></html>
