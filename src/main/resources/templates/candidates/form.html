<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title>Candidate Form — Job Portal</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <div class="nav-brand">⚡ Job<span>Portal</span></div>
  <ul class="nav-links">
    <li><a th:href="@{/}">🏠 Home</a></li>
    <li><a th:href="@{/jobs}">💼 Jobs</a></li>
    <li><a th:href="@{/companies}">🏢 Companies</a></li>
    <li><a th:href="@{/candidates}" class="active">👤 Candidates</a></li>
    <li><a th:href="@{/applications}">📋 Applications</a></li>
  </ul>
</nav>
<main class="container">
  <div class="page-header">
    <div>
      <h1 th:text="${candidate.id != null ? '✏️ Edit Candidate' : '➕ Register Candidate'}"></h1>
      <div class="page-title-sub">Enter the candidate's details below</div>
    </div>
    <a th:href="@{/candidates}" class="btn btn-secondary">← Back</a>
  </div>
  <div class="form-card">
    <div class="form-card-header">
      <h2 th:text="${candidate.id != null ? 'Update Profile' : 'New Candidate'}"></h2>
      <p>Fields marked * are required</p>
    </div>
    <form th:action="${candidate.id != null ? '/candidates/' + candidate.id + '/edit' : '/candidates/new'}"
          th:object="${candidate}" method="post">
      <input type="hidden" th:if="${candidate.id != null}" th:field="*{id}"/>
      <div class="form-body">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" th:value="${candidate.name}" class="form-control" placeholder="e.g. Ravi Kumar" required/>
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-msg"></span>
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" name="email" th:value="${candidate.email}" class="form-control" placeholder="e.g. ravi@example.com" required/>
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-msg"></span>
          </div>
        </div>
        <div class="form-group">
          <label>Technical Skills</label>
          <input type="text" name="skills" th:value="${candidate.skills}" class="form-control" placeholder="e.g. Java, Spring Boot, MySQL, React"/>
        </div>
        <div class="form-group">
          <label>Years of Experience</label>
          <input type="number" name="experience" th:value="${candidate.experience}" class="form-control" placeholder="e.g. 3" min="0" max="50"/>
          <span th:if="${#fields.hasErrors('experience')}" th:errors="*{experience}" class="error-msg"></span>
        </div>
      </div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary" th:text="${candidate.id != null ? 'Update Candidate' : '👤 Register Candidate'}"></button>
        <a th:href="@{/candidates}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</main></body></html>
