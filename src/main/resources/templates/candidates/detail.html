<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title th:text="${candidate.name} + ' — Job Portal'">Candidate</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <div class="nav-brand">⚡ Job<span>Portal</span></div>
  <ul class="nav-links">
    <li><a th:href="@{/}">🏠 Home</a></li>
    <li><a th:href="@{/jobs}">💼 Jobs</a></li>
    <li><a th:href="@{/companies}">🏢 Companies</a></li>
    <li><a th:href="@{/candidates}" class="active">👤 Candidates</a></li>
    <li><a th:href="@{/applications}">📋 Applications</a></li>
  </ul>
</nav>
<main class="container">
  <div class="page-header">
    <div><h1>👤 Candidate Profile</h1><div class="page-title-sub">Full candidate information</div></div>
    <a th:href="@{/candidates}" class="btn btn-secondary">← Back</a>
  </div>
  <div class="detail-card">
    <div class="detail-card-header">
      <div class="detail-icon">👤</div>
      <div><h2 th:text="${candidate.name}"></h2>
        <p th:text="${candidate.email}"></p></div>
    </div>
    <div class="detail-body">
      <div class="detail-row"><span class="detail-label">ID</span><span class="detail-value" th:text="${candidate.id}"></span></div>
      <div class="detail-row"><span class="detail-label">Full Name</span><span class="detail-value" th:text="${candidate.name}"></span></div>
      <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value" th:text="${candidate.email}"></span></div>
      <div class="detail-row"><span class="detail-label">Skills</span><span class="detail-value" th:text="${candidate.skills != null ? candidate.skills : 'Not specified'}"></span></div>
      <div class="detail-row"><span class="detail-label">Experience</span>
        <span class="detail-value" th:text="${candidate.experience != null ? candidate.experience + ' years' : 'Not specified'}"></span>
      </div>
    </div>
    <div class="detail-footer">
      <a th:href="@{/candidates/{id}/edit(id=${candidate.id})}" class="btn btn-warning">✏️ Edit</a>
      <form th:action="@{/candidates/{id}/delete(id=${candidate.id})}" method="post" style="display:inline"
            onsubmit="return confirm('Delete this candidate?')">
        <button type="submit" class="btn btn-danger">🗑️ Delete</button>
      </form>
    </div>
  </div>
</main></body></html>
