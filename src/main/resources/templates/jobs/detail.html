<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head><meta charset="UTF-8"/><title th:text="${job.title} + ' — Job Portal'">Job</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <div class="nav-brand">⚡ Job<span>Portal</span></div>
  <ul class="nav-links">
    <li><a th:href="@{/}">🏠 Home</a></li>
    <li><a th:href="@{/jobs}" class="active">💼 Jobs</a></li>
    <li><a th:href="@{/companies}">🏢 Companies</a></li>
    <li><a th:href="@{/candidates}">👤 Candidates</a></li>
    <li><a th:href="@{/applications}">📋 Applications</a></li>
  </ul>
</nav>
<main class="container">
  <div class="page-header">
    <div><h1>💼 Job Details</h1><div class="page-title-sub">Full information about this role</div></div>
    <a th:href="@{/jobs}" class="btn btn-secondary">← Back to Jobs</a>
  </div>
  <div class="detail-card">
    <div class="detail-card-header">
      <div class="detail-icon">💼</div>
      <div>
        <h2 th:text="${job.title}"></h2>
        <p th:text="${job.companyName} + ' · ' + ${job.location}"></p>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-row"><span class="detail-label">Job ID</span><span class="detail-value" th:text="${job.id}"></span></div>
      <div class="detail-row"><span class="detail-label">Title</span><span class="detail-value" th:text="${job.title}"></span></div>
      <div class="detail-row"><span class="detail-label">Company</span><span class="detail-value" th:text="${job.companyName}"></span></div>
      <div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">📍 <span th:text="${job.location}"></span></span></div>
      <div class="detail-row"><span class="detail-label">Salary</span>
        <span class="detail-value salary-tag" th:if="${job.salary != null}">₹<span th:text="${#numbers.formatDecimal(job.salary,1,'COMMA',0,'POINT')}"></span> / year</span>
        <span class="detail-value" th:if="${job.salary == null}" style="color:var(--text-muted)">Not specified</span>
      </div>
      <div class="detail-row"><span class="detail-label">Description</span><span class="detail-value" th:text="${job.description}"></span></div>
    </div>
    <div class="detail-footer">
      <a th:href="@{/jobs/{id}/edit(id=${job.id})}" class="btn btn-warning">✏️ Edit Job</a>
      <a th:href="@{/applications/new}" class="btn btn-primary">📋 Apply Now</a>
      <form th:action="@{/jobs/{id}/delete(id=${job.id})}" method="post" style="display:inline"
            onsubmit="return confirm('Delete this job?')">
        <button type="submit" class="btn btn-danger">🗑️ Delete</button>
      </form>
    </div>
  </div>
</main>
</body></html>
